<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" role="img" aria-label="OKITA">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,800&amp;display=swap');
      .brand { font-family: 'Fraunces', Georgia, serif; font-weight: 800; font-size: 108px; letter-spacing: -0.04em; fill: #1a1814; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="14" />
      <feComponentTransfer><feFuncA type="linear" slope="0.16" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Paper -->
  <rect width="1080" height="1920" fill="#f4ede0" />

  <!-- App icon (rounded square with sunrise) -->
  <g transform="translate(360 720)" filter="url(#softShadow)">
    <rect width="360" height="360" rx="80" ry="80" fill="#ebe0cc" />
    <circle cx="180" cy="180" r="121" fill="#ff5722" />
    <line x1="46" y1="284" x2="314" y2="284" stroke="#1a1814" stroke-width="2.4" stroke-linecap="round" />
  </g>

  <!-- Wordmark -->
  <text class="brand" x="540" y="1240" text-anchor="middle">OKITA<tspan fill="#ff5722">.</tspan></text>
</svg>
